<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: transparent; font-family: sans-serif; overflow: hidden; }
#editor {
  width: 100%; height: 290px;
  background: #0e1117; color: #fafafa;
  border: 1px solid #555; border-radius: 6px;
  padding: 12px;
  font-family: 'Courier New', Courier, monospace;
  font-size: 14px; resize: none; outline: none;
  transition: border-color 0.2s;
  tab-size: 4;
}
#editor:focus { border-color: #58a6ff; }
#warn {
  display: none; color: #ef4444; font-size: 13px;
  margin-top: 6px; padding: 6px 10px;
  background: rgba(239,68,68,0.12);
  border-left: 3px solid #ef4444; border-radius: 4px;
}
#footer { display: flex; justify-content: space-between; margin-top: 4px; }
#charcount { color: #888; font-size: 12px; }
#tabtip { color: #555; font-size: 12px; }
</style>
</head>
<body>
<textarea id="editor" placeholder="// Escribe tu solución..."></textarea>
<div id="warn">⛔ Pegar está deshabilitado. Debes escribir el código a mano.</div>
<div id="footer">
  <span id="charcount">0 caracteres</span>
  <span id="tabtip">Tab = 4 espacios</span>
</div>
<script>
(function() {
  var ta = document.getElementById('editor');
  var warn = document.getElementById('warn');
  var cc = document.getElementById('charcount');
  var lastSent = '';

  function showWarn() {
    warn.style.display = 'block';
    clearTimeout(warn._t);
    warn._t = setTimeout(function() { warn.style.display = 'none'; }, 2500);
  }

  function sendValue() {
    if (ta.value !== lastSent) {
      lastSent = ta.value;
      cc.textContent = ta.value.length + ' caracteres';
      Streamlit.setComponentValue(ta.value);
    }
  }

  // Tab como indentación
  ta.addEventListener('keydown', function(e) {
    if (e.key === 'Tab') {
      e.preventDefault();
      var s = ta.selectionStart, end = ta.selectionEnd;
      ta.value = ta.value.substring(0, s) + '    ' + ta.value.substring(end);
      ta.selectionStart = ta.selectionEnd = s + 4;
      sendValue();
    }
    // Bloquear Ctrl+V / Cmd+V
    if ((e.ctrlKey || e.metaKey) && (e.key === 'v' || e.key === 'V')) {
      e.preventDefault(); e.stopPropagation(); showWarn();
    }
  }, true);

  // Bloquear paste en fase de captura
  ta.addEventListener('paste', function(e) {
    e.preventDefault(); e.stopPropagation(); showWarn(); return false;
  }, true);

  // Bloquear clic derecho
  ta.addEventListener('contextmenu', function(e) { e.preventDefault(); showWarn(); });

  // Bloquear drag & drop
  ta.addEventListener('dragover', function(e) { e.preventDefault(); });
  ta.addEventListener('drop', function(e) { e.preventDefault(); showWarn(); });

  // Enviar cambios
  ta.addEventListener('input', sendValue);
  ta.addEventListener('keyup', sendValue);

  // Inicializar componente Streamlit
  function onRender(event) {
    if (!event.detail) return;
    var args = event.detail.args || {};
    if (args.initial_value && ta.value === '') {
      ta.value = args.initial_value;
      cc.textContent = ta.value.length + ' caracteres';
    }
    if (args.placeholder) ta.placeholder = args.placeholder;
  }

  Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, onRender);
  Streamlit.setComponentReady();
  Streamlit.setFrameHeight(340);
})();
</script>
<script src="https://unpkg.com/streamlit-component-lib/dist/index.js"></script>
</body>
</html>
